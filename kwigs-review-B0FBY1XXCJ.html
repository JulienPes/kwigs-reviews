<title>Kwigs – Merci</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    color: #0a0a0a;
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(1rem, 5vw, 2.5rem);
  }
  .container { text-align: center; width: 100%; max-width: 420px; }
  .logo { width: clamp(130px, 42vw, 190px); height: auto; display: block; margin: 0 auto 0.15rem; }
  h1 { font-size: clamp(1rem, 4vw, 1.4rem); font-weight: 700; letter-spacing: 0.04em; margin-bottom: clamp(0.3rem, 2vw, 0.6rem); line-height: 1; }
  .sub { font-size: clamp(0.7rem, 2.5vw, 0.85rem); color: #bbb; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: clamp(1.5rem, 5vw, 2.5rem); }
  .spinner-wrap { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem; height: 20px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #f5a623; animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; background: #0a0a0a; }
  .dot:nth-child(3) { animation-delay: 0.4s; background: #f5a623; }
  .fallback { display: none; flex-direction: column; gap: clamp(0.4rem, 1.5vw, 0.6rem); width: 100%; }
  .fallback.visible { display: flex; }
  .fallback-title { font-size: clamp(0.55rem, 1.8vw, 0.65rem); letter-spacing: 0.2em; text-transform: uppercase; color: #ccc; margin-bottom: 0.2rem; }
  .country-btn {
    display: flex; align-items: center; justify-content: space-between;
    padding: clamp(0.75rem, 2.5vw, 1rem) clamp(1rem, 3vw, 1.4rem);
    border: 1.5px solid #ebebeb; border-radius: 6px;
    background: #fafafa; color: #0a0a0a; text-decoration: none;
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(0.75rem, 2.5vw, 0.85rem);
    transition: border-color 0.2s, background 0.2s; width: 100%;
  }
  .country-btn:hover, .country-btn:active { border-color: #f5a623; background: #fffdf5; }
  .country-btn .flag { font-size: clamp(1rem, 3.5vw, 1.2rem); }
  .country-btn .arrow { color: #f5a623; font-size: 1rem; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.5); opacity: 1; }
  }
</style>

  }

  function redirect(country) {
    const appURL = buildURL(country);
    const webFallback = webURL(country);

    // Tente le schéma URI (ouvre l'app si installée)
    // Sur iOS/Android avec l'app Amazon : ouvre direct dans l'app
    // Sinon : bascule sur le site web après 1.5s
    const fallbackTimer = setTimeout(function() {
      window.location.href = webFallback;
    }, 1500);

    window.addEventListener('blur', function() {
      clearTimeout(fallbackTimer); // L'app s'est ouverte, on annule le fallback web
    });

    window.location.href = appURL;
  }

  const timer = setTimeout(showFallback, 4000);

  fetch('https://ipapi.co/json/')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      clearTimeout(timer);
      redirect(d.country_code);
    })
    .catch(showFallback);
</script>
</body>
</html>
